<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width initial-scale=1.0">
<title>Factorial</title>
<body>
<h2>Factorial</h2>
<label for="Description">Enter a number:</label>
<input type="number" id="num">
<p id="result"></p>
<button onclick="factorial()">Factorial</button>
<script>
function factorial(){
let n = Number(document.getElementById("num").value);
let result=1;
for(let i=1;i<=n;i++){
result *= i;
}
document.getElementById("result").innerHTML = "Factorial is " + result;
}
</script>
</body>
</html>
