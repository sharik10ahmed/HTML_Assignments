<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Target Attribute Iframe Demo</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #f4f4f9; 
        }
        .main-window {
            border: 4px solid #333;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
        }
        iframe { 
            width: 100%; 
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="main-window">
        <h1>Main Browser Window (The Top Level)</h1>
        <p>If a link uses <code>target="_top"</code>, it will break out of all the boxes below and take over this entire page.</p>

        <iframe height="350" srcdoc="
            <style>
                body { background-color: #ffebee; padding: 15px; font-family: sans-serif; border: 3px dashed #f44336; }
            </style>
            <h2>Iframe A (The Parent Frame)</h2>
            <p>If a link inside the blue box uses <code>target=&#34;_parent&#34;</code>, it will break out and take over this pink box.</p>
            
            <iframe height="180" srcdoc='
                <style>
                    body { background-color: #e3f2fd; padding: 15px; font-family: sans-serif; border: 3px dotted #2196f3; }
                    a { display: block; margin-bottom: 10px; font-weight: bold; }
                </style>
                <h3>Iframe B (The Child Frame)</h3>
                
                <a href=&#34;https://example.com&#34; target=&#34;_self&#34;>1. _self: Click to load in this blue box</a>
                <a href=&#34;https://example.com&#34; target=&#34;_parent&#34;>2. _parent: Click to load in the pink box</a>
                <a href=&#34;https://example.com&#34; target=&#34;_top&#34;>3. _top: Click to take over the whole screen</a>
                <a href=&#34;https://example.com&#34; target=&#34;_blank&#34;>4. _blank: Click to open a new tab</a>
            '></iframe>
        "></iframe>
    </div>

</body>
</html>
