<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
  // 1. Arithmetic
  let a = 10 + 5; 
  document.write("Arithmetic (10 + 5): " + a + "<br>"); // Prints 15

  // 2. Assignment
  a += 5; // a=a+5 // a=15+5 // a=20
  document.write("After Assignment (+= 5): " + a + "<br>"); // Prints 20

  // 3. Comparison
  document.write("Is 'a' exactly 20? " + (a === 20)); // Prints true
</script>
</body>
</html>
