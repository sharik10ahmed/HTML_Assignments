<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    Number 1: <input type="number" id="num1"><br><br>
    Number 2: <input type="number" id="num2"><br><br>
    Number 3: <input type="number" id="num3"><br><br>
    <button onclick="findgreatest()">Find Greatest</button>
    <p id="result"></p>
    <script>
        function findgreatest() {
            // Get 3 numbers and convert them from text to actual Math Numbers
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);
            let c = Number(document.getElementById("num3").value); 

            // Compare them using Greater Than (>) and AND (&&)
            if (a >= b && a >= c) {
                document.getElementById("result").innerHTML= a + " is greatest.";
            } else if (b >= a && b >= c) {
                document.getElementById("result").innerHTML= b + " is greatest.";
            } else {
                document.getElementById("result").innerHTML= c + " is greatest.";
            }
        }
    </script>
</body>

</html>
