<!Doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Styled Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      /* Added flexbox to perfectly center the box on the screen */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      /* Fixed the letter 'O' to the number '0' and made the shadow softer */
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2); 
    }
    h1 {
      color: darkblue;
      margin-top: 0;
    }
    p {
      color: #333;
      font-size: 18px;
    }
    button {
      background-color: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      /* Added transition for a smooth hover effect */
      transition: background-color 0.3s ease; 
    }
    button:hover {
      background-color: darkblue;
    }
  </style>
</head>
<body>
  
  <div class="box">
    <h1>Welcome Students</h1>
    <p>This is a simple webpage designed using HTML and CSS.</p>
    <button onclick="alert('Button clicked! Great job.')">Click Me</button>
  </div>

</body>
</html>
