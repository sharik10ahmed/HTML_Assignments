<!DOCTYPE html>
<html>
<head>
 <style>
   .container {
     display:grid;
     grid-template-columns: repeat(4,1fr);
     gap: 10px;
   }

   .box {
     background-color: black;
     color: white;
     padding: 20px;
     text-align: center;
   }
 </style>
</head>
<body>

 <div class="container">
   <div class="box">1</div>
   <div class="box">2</div>
   <div class="box">3</div>
   <div class="box">4</div>
 </div>

</body>
</html>
